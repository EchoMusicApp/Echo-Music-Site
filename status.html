<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Service Status - Echo Music</title>
    <!-- Google Fonts for typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Unbounded:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="./assets/Echo.png">
    
    <style>
        :root {
            --canvas: #fffaf0;
            --surface-soft: #faf5e8;
            --surface-card: #f5f0e0;
            --surface-dark: #0a1a1a;
            --ink: #0a0a0a;
            --body: #3a3a3a;
            --muted: #6a6a6a;
            --hairline: #e5e5e5;
            
            --success: #10b981;
            --error: #ef4444;

            --space-xs: 8px;
            --space-sm: 12px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-xxl: 48px;

            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-pill: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--canvas);
            color: var(--body);
            -webkit-font-smoothing: antialiased;
            line-height: 1.55;
            min-height: 100vh;
            padding-top: 100px;
        }

        h1, h2, h3, .display-font {
            font-family: 'Unbounded', sans-serif;
            color: var(--ink);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 var(--space-xl);
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 250, 240, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid var(--hairline);
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 72px;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 var(--space-xl);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
            color: var(--ink);
        }

        .nav-logo-img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        .hero {
            text-align: center;
            margin-bottom: var(--space-xl);
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -150%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(184, 164, 237, 0.15) 0%, rgba(255, 77, 139, 0.05) 25%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 500;
            letter-spacing: -2px;
            line-height: 1.05;
            margin-bottom: var(--space-md);
        }

        .hero p {
            color: var(--muted);
            font-size: 18px;
            max-width: 520px;
            margin: 0 auto;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.0;
            border-radius: var(--radius-pill);
            height: 48px;
            padding: 0 28px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
        }

        .btn-primary {
            background-color: var(--surface-dark);
            color: #fff;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 0px var(--ink);
        }
        
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .timer-container {
            text-align: center;
            margin-bottom: var(--space-xl);
            color: var(--muted);
            font-size: 14px;
            font-weight: 500;
        }

        .timer-value {
            color: var(--ink);
            font-weight: 600;
        }

        .status-list {
            background-color: var(--surface-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--hairline);
            margin-bottom: 80px;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(0,0,0,0.02);
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: background-color 0.2s ease;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-item:hover {
            background-color: rgba(0, 0, 0, 0.02);
        }

        .service-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
        }

        .service-name {
            font-size: 18px;
            font-weight: 600;
            font-family: 'Unbounded', sans-serif;
            color: var(--ink);
        }

        .service-name a:hover {
            text-decoration: underline;
        }
        
        .service-url {
            font-size: 13px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 140px;
            justify-content: center;
            flex-shrink: 0;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-online {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .status-online::before {
            background-color: var(--success);
        }

        .status-offline {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--error);
        }

        .status-offline::before {
            background-color: var(--error);
        }

        .status-pending {
            background-color: rgba(106, 106, 106, 0.15);
            color: var(--muted);
        }

        .status-pending::before {
            background-color: var(--muted);
        }
        
        /* Deep Mobile Optimization */
        @media (max-width: 768px) {
            body { 
                padding-top: 80px; 
            }
            .container {
                padding: 0 16px;
            }
            .nav-inner {
                padding: 0 16px;
                height: 60px;
            }
            .nav-logo {
                font-size: 18px;
            }
            .nav-logo-img {
                width: 28px;
                height: 28px;
            }
            .nav-links .btn {
                height: 36px;
                padding: 0 16px;
                font-size: 13px;
            }
            .hero {
                margin-bottom: 24px;
            }
            .hero h1 { 
                font-size: 32px;
                letter-spacing: -1px;
                margin-bottom: 8px;
            }
            .hero p {
                font-size: 15px;
            }
            .controls {
                margin-bottom: 16px;
            }
            .controls .btn {
                width: 100%;
                height: 48px;
            }
            .timer-container {
                margin-bottom: 24px;
            }
            .status-list {
                border-radius: 16px;
                margin-bottom: 40px;
            }
            .status-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 16px;
            }
            .service-info {
                width: 100%;
            }
            .service-name {
                font-size: 16px;
            }
            .service-url {
                font-size: 12px;
                white-space: normal;
                word-break: break-all;
            }
            .status-badge {
                width: 100%;
                padding: 10px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-inner">
            <a href="index.html" class="nav-logo display-font">
                <img src="./assets/Echo.png" alt="Echo Music" class="nav-logo-img">
                Echo Music
            </a>
            <div class="nav-links">
                <a href="index.html" class="btn btn-primary">Back</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>System Status</h1>
            <p>Real-time service monitoring</p>
        </div>

        <div class="controls">
            <button id="force-ping-btn" class="btn btn-primary" onclick="pingAllServices()">Check Status Now</button>
        </div>

        <div class="timer-container">
            Next check in: <span id="countdown" class="timer-value">05:00</span>
        </div>

        <div class="status-list" id="status-list">
            <!-- Items injected via JS -->
        </div>
    </div>

    <script>
        // Updated order and naming as requested
        const services = [
            { id: 'canvas', name: 'Canvas', url: 'https://canvas.echomusic.fun' },
            { id: 'youtube', name: 'YouTube Music', url: 'https://music.youtube.com' },
            { id: 'saavn-1', name: 'Server 1 - Saavn', url: 'https://saavn.echomusic.fun' },
            { id: 'saavn-2', name: 'Server 2 - Saavn', url: 'https://jiosaavn-api.pc-adityadav9532.workers.dev' },
            { id: 'saavn-3', name: 'Server 3 - Saavn', url: 'https://jiosaavn-api.mac-adityadav9532.workers.dev' },
            { id: 'qobuz', name: 'Qobuz Lossless', url: 'https://qobuz.kennyy.com.br' }
        ];

        function createList() {
            const list = document.getElementById('status-list');
            
            services.forEach(service => {
                const item = document.createElement('div');
                item.className = 'status-item';
                item.innerHTML = `
                    <div class="service-info">
                        <div class="service-name">
                            <a href="${service.url}" target="_blank">${service.name}</a>
                        </div>
                    </div>
                    <div id="status-${service.id}" class="status-badge status-pending">Checking...</div>
                `;
                list.appendChild(item);
            });
        }

        async function pingService(service) {
            let isOnline = false;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // 10s timeout
                
                await fetch(service.url, { 
                    mode: 'no-cors',
                    cache: 'no-store',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                isOnline = true;
            } catch (error) {
                isOnline = false;
            }

            return isOnline;
        }

        function updateItemUI(serviceId, isOnline) {
            const statusEl = document.getElementById(`status-${serviceId}`);
            
            if (isOnline) {
                statusEl.className = 'status-badge status-online';
                statusEl.textContent = 'Operational';
            } else {
                statusEl.className = 'status-badge status-offline';
                statusEl.textContent = 'Outage';
            }
        }

        async function pingAllServices() {
            const btn = document.getElementById('force-ping-btn');
            btn.disabled = true;
            btn.textContent = 'Checking...';

            // Set all to pending state first
            services.forEach(service => {
                const statusEl = document.getElementById(`status-${service.id}`);
                statusEl.className = 'status-badge status-pending';
                statusEl.textContent = 'Checking...';
            });
            
            const promises = services.map(async (service) => {
                const isOnline = await pingService(service);
                updateItemUI(service.id, isOnline);
            });

            await Promise.all(promises);
            
            btn.disabled = false;
            btn.textContent = 'Check Status Now';
            resetTimer();
        }

        // Timer Logic
        let countdownSeconds = 5 * 60;
        let timerInterval;

        function updateTimerDisplay() {
            const mins = Math.floor(countdownSeconds / 60);
            const secs = countdownSeconds % 60;
            document.getElementById('countdown').textContent = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            countdownSeconds = 5 * 60;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                countdownSeconds--;
                if (countdownSeconds <= 0) {
                    pingAllServices();
                } else {
                    updateTimerDisplay();
                }
            }, 1000);
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            createList();
            pingAllServices(); // Initial ping
        });
    </script>
</body>
</html>
